version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "P2"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      torch-stack:
        patterns:
          - "torch*"
          - "triton*"
      tooling:
        patterns:
          - "ruff"
          - "pytest*"
          - "uv"
          - "hatchling"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "ci"
      - "P2"
    commit-message:
      prefix: "chore(actions)"

  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "deps"
      - "P2"
    commit-message:
      prefix: "chore(submodule)"
