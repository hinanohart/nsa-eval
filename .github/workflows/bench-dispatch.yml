name: bench-dispatch

on:
  # Cron triggers per design memo §F: Mon/Wed/Fri 18:00 UTC.
  # Run the default config on the public Ubuntu runner pool (CPU only) so the result series
  # is non-empty without external infra. CUDA / MPS runs go through bench-mps.yml or
  # bench-kaggle.yml.
  schedule:
    - cron: '0 18 * * 1,3,5'
  workflow_dispatch:
    inputs:
      config:
        description: 'Path to the eval config (e.g. configs/config.yaml)'
        required: true
        default: 'configs/config.yaml'
      device:
        description: 'Override device (cuda | cpu)'
        required: false
        default: 'cpu'

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Install project
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev,bench]"
      - name: Run eval cell
        env:
          # `inputs.*` is empty on scheduled cron triggers; fall back to the default config so
          # the scheduled run is meaningful instead of invoking `--config ` with no value.
          CONFIG_PATH: ${{ inputs.config || 'configs/config.yaml' }}
        run: |
          source .venv/bin/activate
          nsa-eval run --config "$CONFIG_PATH"
      - name: Upload result
        uses: actions/upload-artifact@v7
        with:
          name: bench-result-${{ github.run_id }}
          path: benchmarks/results/**/*.json
