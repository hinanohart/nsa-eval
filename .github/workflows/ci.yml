name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Install project (dev + bench, CPU only)
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev,bench]"
      - name: Ruff
        run: |
          source .venv/bin/activate
          ruff check .
          ruff format --check .
      - name: Pytest
        run: |
          source .venv/bin/activate
          pytest -ra --strict-markers --strict-config -m "not cuda and not mps and not slow"
