name: bench-kaggle

# Publishes the latest config + scaffold as a Kaggle Notebook so external users can reproduce
# the CUDA / TPU paths without provisioning hardware. Triggered weekly; manual dispatch
# available for ad-hoc pushes.
#
# Requires repo secrets KAGGLE_USERNAME and KAGGLE_KEY (gate A'). Until they are set, the
# workflow is a no-op.

on:
  schedule:
    # Tuesday 07:00 UTC. Deliberately offset from leaderboard-update (Mon 06:00) so two cron
    # workflows don't race for the same minute slot.
    - cron: '0 7 * * 2'
  workflow_dispatch:
    inputs:
      notebook:
        description: 'Path to the notebook to push (default: notebooks/_template_kaggle.ipynb)'
        required: false
        default: 'notebooks/_template_kaggle.ipynb'

permissions:
  contents: read

jobs:
  push:
    if: ${{ vars.KAGGLE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install kaggle CLI
        run: pip install --quiet kaggle
      - name: Configure Kaggle credentials
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          printf '{"username":"%s","key":"%s"}\n' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
      - name: Push notebook
        env:
          NOTEBOOK_PATH: ${{ inputs.notebook || 'notebooks/_template_kaggle.ipynb' }}
        run: |
          # KAGGLE_ENABLED is true at this point (`if:` above gated the job), so a missing
          # kernel-metadata.json is now an honest failure rather than a silent no-op.
          if [ ! -f notebooks/kernel-metadata.json ]; then
            echo "::error::KAGGLE_ENABLED=true but notebooks/kernel-metadata.json does not exist."
            echo "Wire it up (issue P1-10) before flipping the variable."
            exit 1
          fi
          if [ ! -f "$NOTEBOOK_PATH" ]; then
            echo "::error::notebook not found at $NOTEBOOK_PATH"
            exit 1
          fi
          STAGE="$(mktemp -d)"
          cp notebooks/kernel-metadata.json "$STAGE/"
          cp "$NOTEBOOK_PATH" "$STAGE/"
          kaggle kernels push -p "$STAGE"
